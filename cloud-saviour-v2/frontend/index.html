<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Saviour</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Cloud Saviour <span>OpenEnv Environment Dashboard</span></h1>
            <div class="controls">
                <select id="task-select">
                    <option value="web">Web Optimization</option>
                    <option value="ai">AI Optimization</option>
                    <option value="full">Full System Optimization</option>
                </select>
                <button id="btn-reset" class="primary">Reset</button>
                <button id="btn-refresh">Refresh State</button>
                <button id="btn-baseline" class="accent">Run Baseline</button>
                <small>Select a task and press Reset to begin simulation</small>
            </div>
        </header>

        <main>
            <div class="left-panel">
                <h2>System Metrics</h2>

                <section class="metrics-grid">
                    <div class="metric-card">
                        <h3>Hour</h3>
                        <div id="metric-hour" class="value">0</div>
                    </div>
                    <div class="metric-card">
                        <h3>Quality Score</h3>
                        <div id="metric-quality" class="value">0.0</div>
                    </div>
                    <div class="metric-card">
                        <h3>Cost / Month</h3>
                        <div id="metric-cost" class="value">$0.0</div>
                    </div>
                    <div class="metric-card">
                        <h3>CPU Load</h3>
                        <div id="metric-cpu" class="value">0%</div>
                    </div>
                    <div class="metric-card">
                        <h3>GPU Load</h3>
                        <div id="metric-gpu" class="value">0%</div>
                    </div>
                    <div class="metric-card">
                        <h3>Latency</h3>
                        <div id="metric-latency" class="value">0ms</div>
                    </div>
                </section>

                <section class="action-panel">
                    <h2>Manual Controls</h2>
                    <div class="action-buttons">
                        <button class="action-btn" data-action="do_nothing">Do Nothing</button>
                        <button class="action-btn" data-action="enable_cache">Enable Cache</button>
                        <button class="action-btn" data-action="disable_cache">Disable Cache</button>
                        <button class="action-btn" data-action="route_ai_small">AI Small Model</button>
                        <button class="action-btn" data-action="route_ai_large">AI Large Model</button>
                        <button class="action-btn" data-action="scale_up_web">Scale Up Web</button>
                        <button class="action-btn" data-action="scale_down_web">Scale Down Web</button>
                        <button class="action-btn" data-action="move_batch_to_spot">Batch to Spot</button>
                        <button class="action-btn" data-action="move_batch_to_on_demand">Batch to On-Demand</button>
                    </div>

                    <div class="advisor-section">
                        <button id="btn-recommend" class="secondary">Get Recommendation</button>
                        <div id="recommendation-output"></div>
                    </div>
                </section>
            </div>

            <div class="right-panel">
                <section class="log-panel">
                    <h2>Action Log</h2>
                    <div id="action-log" class="console"></div>
                </section>

                <section class="state-panel">
                    <h2>System State (JSON)</h2>
                    <pre id="state-json"></pre>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
